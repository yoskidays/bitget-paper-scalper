name: Build Windows EXE and Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build portable EXE
        run: pyinstaller --noconfirm --clean BitgetPaperScalper.spec

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\BitgetPaperScalper.iss'

      - name: Upload portable EXE
        uses: actions/upload-artifact@v7
        with:
          name: BitgetPaperScalper-Portable
          path: dist/BitgetPaperScalper.exe

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: BitgetPaperScalper-Installer
          path: dist-installer/BitgetPaperScalper-Setup.exe
